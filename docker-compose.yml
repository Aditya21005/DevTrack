services:
  postgres:
    image: postgres:16-alpine
    container_name: devtrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devtrack_ai}
      POSTGRES_USER: ${POSTGRES_USER:-devtrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devtrack-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEVTRACK_APP_NAME: DevTrack AI
      DEVTRACK_ENVIRONMENT: ${DEVTRACK_ENVIRONMENT:-production}
      DEVTRACK_DEBUG: "false"
      DEVTRACK_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-devtrack}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devtrack_ai}
      DEVTRACK_DATABASE_POOL_SIZE: ${DEVTRACK_DATABASE_POOL_SIZE:-10}
      DEVTRACK_DATABASE_MAX_OVERFLOW: ${DEVTRACK_DATABASE_MAX_OVERFLOW:-20}
      DEVTRACK_DATABASE_POOL_TIMEOUT_SECONDS: ${DEVTRACK_DATABASE_POOL_TIMEOUT_SECONDS:-30}
      DEVTRACK_DATABASE_POOL_RECYCLE_SECONDS: ${DEVTRACK_DATABASE_POOL_RECYCLE_SECONDS:-1800}
      DEVTRACK_DATABASE_POOL_USE_LIFO: ${DEVTRACK_DATABASE_POOL_USE_LIFO:-true}
      DEVTRACK_LOG_LEVEL: ${DEVTRACK_LOG_LEVEL:-INFO}
      DEVTRACK_LOG_FORMAT: ${DEVTRACK_LOG_FORMAT:-json}
      DEVTRACK_JWT_ACCESS_SECRET_KEY: ${DEVTRACK_JWT_ACCESS_SECRET_KEY:?set DEVTRACK_JWT_ACCESS_SECRET_KEY}
      DEVTRACK_JWT_REFRESH_SECRET_KEY: ${DEVTRACK_JWT_REFRESH_SECRET_KEY:?set DEVTRACK_JWT_REFRESH_SECRET_KEY}
      DEVTRACK_ALLOWED_HOSTS: ${DEVTRACK_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DEVTRACK_CORS_ALLOWED_ORIGINS: ${DEVTRACK_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-30}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-3}
      GEMINI_RATE_LIMIT_PER_MINUTE: ${GEMINI_RATE_LIMIT_PER_MINUTE:-60}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      GITHUB_TOKEN_ENCRYPTION_KEY: ${GITHUB_TOKEN_ENCRYPTION_KEY:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_USE_MOCK_API: ${VITE_USE_MOCK_API:-false}
    container_name: devtrack-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
